<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte de Visite – David Courtin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#0f0f0f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
.card-scene{width:100%;max-width:640px}
.card{width:100%;aspect-ratio:1.75/1;max-height:366px;position:relative;border-radius:6px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6);display:grid;grid-template-columns:1fr 180px}
.card-left{padding:1.8rem 2rem;display:flex;flex-direction:column;justify-content:space-between;position:relative;z-index:2;transition:background .4s}
.card-left::after{content:'';position:absolute;right:-1px;top:0;bottom:0;width:1px;background:rgba(255,255,255,.08)}
.top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:.6rem}
.person-info{flex:1;min-width:0}
.person-name{font-size:1rem;font-weight:600;color:#fff;letter-spacing:.06em;text-transform:uppercase}
.person-title{font-size:.65rem;font-weight:300;color:rgba(255,255,255,.65);letter-spacing:.1em;text-transform:uppercase;margin-top:.2rem}
.profile-photo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:2.5px solid rgba(255,255,255,0.4);flex-shrink:0}
.divider{width:28px;height:1.5px;margin:.7rem 0;transition:background .4s}
.contact-list{display:flex;flex-direction:column;gap:.3rem;margin-top:auto;padding-top:.8rem}
.contact-item{display:flex;align-items:center;gap:.5rem;font-size:.68rem;color:rgba(255,255,255,.75);font-weight:300}
.contact-icon{width:12px;height:12px;opacity:.7;flex-shrink:0}
.card-right{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;gap:.6rem;position:relative;z-index:2;transition:background .4s}
.accent-bar{position:absolute;top:0;left:0;right:0;height:4px;transition:background .4s}
#qrcode{width:88px!important;height:88px!important}
#qrcode canvas,#qrcode img{width:88px!important;height:88px!important}
.qr-label{font-size:.55rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#aaa;text-align:center;margin-top:.2rem}
.logo-wrap{width:100%;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.logo-wrap img.company-logo{max-width:140px;max-height:75px;object-fit:contain;display:block}
.logo-initial{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:#fff;transition:background .4s}
.ring-svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-90deg);width:80px;height:80px;pointer-events:none}
.ring-track{fill:none;stroke:rgba(100,100,100,.3);stroke-width:2}
.ring-progress{fill:none;stroke:rgba(100,100,100,.8);stroke-width:2;stroke-linecap:round;stroke-dasharray:220;stroke-dashoffset:220}
.hint{text-align:center;margin-top:1.4rem;font-size:.62rem;color:#333;letter-spacing:.1em;text-transform:uppercase;transition:opacity .6s}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.visible{opacity:1;pointer-events:all}
.modal{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:2rem;width:90%;max-width:320px}
.modal-title{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:#555;margin-bottom:1.2rem;text-align:center}
.modal-companies{display:flex;flex-direction:column;gap:.6rem}
.modal-btn{display:flex;align-items:center;gap:1rem;padding:.85rem 1rem;border:1px solid #2a2a2a;border-radius:4px;background:transparent;cursor:pointer;width:100%;text-align:left}
.modal-btn.selected{border-color:var(--c)}
.modal-btn-name{font-size:.85rem;font-weight:500;color:#ddd}
.modal-logo{width:36px;height:36px;object-fit:contain;background:white;border-radius:3px;padding:2px;flex-shrink:0}
.modal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.modal-close{margin-top:1.2rem;width:100%;padding:.7rem;border:1px solid #2a2a2a;border-radius:4px;background:transparent;color:#555;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
@media(max-width:480px){
  .card{grid-template-columns:1fr 130px}
  .card-left{padding:1.2rem 1.2rem}
  .person-name{font-size:.85rem}
  .profile-photo{width:68px;height:68px}
  #qrcode{width:72px!important;height:72px!important}
  #qrcode canvas,#qrcode img{width:72px!important;height:72px!important}
  .logo-wrap img.company-logo{max-width:110px;max-height:60px}
  .card-right{padding:.8rem;gap:.4rem}
}
</style>
</head>

const companies = [
  {logoKey:"fraisseix",initial:"F",address:"5 rue Santos-Dumont, 87000 Limoges",color:"#1a2e4a",accent:"#c8a96e",rightBg:"#f5f5f0",leftBg:"#1a2e4a",shortName:"Fraisseix Déménagements"},
  {logoKey:"bardon",initial:"B",address:"16 rue d'Aguesseau, 87000 Limoges",color:"#e63900",accent:"#ff6633",rightBg:"#fff4f0",leftBg:"#e63900",shortName:"Bardon Déménagements"},
  {logoKey:"ldl",initial:"L",address:"310 rue François Perrin, 87000 Limoges",color:"#1a2e6b",accent:"#cc1e1e",rightBg:"#f0f3f8",leftBg:"#1a2e6b",shortName:"Les Déménageurs Limousins"},
  {logoKey:"limodem",initial:"LD",address:"5 rue Santos-Dumont, 87000 Limoges",color:"#1e2d5a",accent:"#777",rightBg:"#f0f2f8",leftBg:"#1e2d5a",shortName:"Limo Dem"}
];
let pressTimer=null, rafId=null, hintHidden=false;
const HOLD=700;

function applyCompany(idx) {
  const c = companies[idx];
  document.getElementById('addressText').textContent = c.address;
  document.getElementById('cardLeft').style.background = c.leftBg;
  document.getElementById('cardRight').style.background = c.rightBg;
  document.getElementById('accentBar').style.background = c.color;
  document.getElementById('divider').style.background = c.accent;

  const wrap = document.getElementById('logoWrap');
  const initial = document.getElementById('logoInitial');
  const oldImg = wrap.querySelector('img');
  if (oldImg) oldImg.remove();

  if (c.logoKey && LOGOS[c.logoKey]) {
    initial.style.display = 'none';
    const img = document.createElement('img');
    img.className = 'company-logo';
    img.src = LOGOS[c.logoKey];
    // Fraisseix logo is light bg — show on white pill
    if (c.logoKey === 'fraisseix') {
      img.style.cssText = 'max-width:140px;max-height:70px;object-fit:contain;display:block;background:rgba(255,255,255,0.92);border-radius:6px;padding:6px 10px;';
    } else {
      img.style.cssText = 'max-width:140px;max-height:75px;object-fit:contain;display:block;';
    }
    wrap.appendChild(img);
  } else {
    initial.style.display = 'flex';
    initial.textContent = c.initial;
    initial.style.background = c.color;
  }

  const qrDiv = document.getElementById('qrcode');
  qrDiv.innerHTML = '';
  new QRCode(qrDiv, {text:CARD_URL,width:88,height:88,colorDark:c.color,colorLight:c.rightBg,correctLevel:QRCode.CorrectLevel.M});

  document.querySelectorAll('.modal-btn').forEach((btn,i) => {
    btn.classList.toggle('selected', i===idx);
  });
}

const mc = document.getElementById('modalCompanies');
companies.forEach((c,i) => {
  const btn = document.createElement('button');
  btn.className = 'modal-btn';
  btn.style.setProperty('--c', c.color);
  const logoEl = (c.logoKey && LOGOS[c.logoKey])
    ? `<img class="modal-logo" src="${LOGOS[c.logoKey]}">`
    : `<span class="modal-dot" style="background:${c.color}"></span>`;
  btn.innerHTML = logoEl + `<span class="modal-btn-name">${c.shortName}</span>`;
  btn.addEventListener('touchend', e => { e.preventDefault(); closeModal(); setTimeout(()=>applyCompany(i),30); });
  btn.addEventListener('click', () => { closeModal(); setTimeout(()=>applyCompany(i),30); });
  mc.appendChild(btn);
});

function openModal() { document.getElementById('modalOverlay').classList.add('visible'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('visible'); }
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalClose').addEventListener('touchend', e=>{e.preventDefault();closeModal();});
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target===document.getElementById('modalOverlay')) closeModal(); });

const wrap = document.getElementById('logoWrap');
const ring = document.getElementById('ringProgress');
const C = 220;

function startPress(e) {
  e.preventDefault();
  ring.style.transition='none';
  ring.style.strokeDashoffset=C;
  let start=null;
  function tick(ts) {
    if(!start) start=ts;
    const p = Math.min((ts-start)/HOLD,1);
    ring.style.strokeDashoffset = C*(1-p);
    if(p<1) rafId=requestAnimationFrame(tick);
  }
  rafId=requestAnimationFrame(tick);
  pressTimer=setTimeout(()=>{
    cancelAnimationFrame(rafId);
    ring.style.strokeDashoffset=C;
    openModal();
