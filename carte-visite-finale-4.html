<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte de Visite – David Courtin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#0f0f0f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
.card-scene{width:100%;max-width:640px}
.card{width:100%;aspect-ratio:1.75/1;max-height:366px;position:relative;border-radius:6px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6);display:grid;grid-template-columns:1fr 180px}
.card-left{padding:2.5rem 2.2rem;display:flex;flex-direction:column;justify-content:space-between;position:relative;z-index:2;transition:background .4s}
.card-left::after{content:'';position:absolute;right:-1px;top:0;bottom:0;width:1px;background:rgba(255,255,255,.08)}
.company-name{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;color:#fff;line-height:1.2;white-space:pre-line}
.divider{width:32px;height:1.5px;margin:.9rem 0;transition:background .4s}
.person-name{font-size:1.15rem;font-weight:600;color:#fff;letter-spacing:.06em;text-transform:uppercase}
.person-title{font-size:.72rem;font-weight:300;color:rgba(255,255,255,.65);letter-spacing:.12em;text-transform:uppercase;margin-top:.25rem}
.contact-list{display:flex;flex-direction:column;gap:.35rem;margin-top:auto;padding-top:1.2rem}
.contact-item{display:flex;align-items:center;gap:.55rem;font-size:.72rem;color:rgba(255,255,255,.75);font-weight:300}
.contact-icon{width:14px;height:14px;opacity:.7;flex-shrink:0}
.card-right{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;gap:1rem;position:relative;z-index:2;transition:background .4s}
.accent-bar{position:absolute;top:0;left:0;right:0;height:4px;transition:background .4s}
#qrcode{width:100px!important;height:100px!important}
#qrcode canvas,#qrcode img{width:100px!important;height:100px!important}
.qr-label{font-size:.58rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:#aaa;text-align:center;margin-top:.4rem}
.logo-wrap{width:64px;height:64px;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.logo-wrap img{max-width:60px;max-height:60px;object-fit:contain;border-radius:4px}
.logo-initial{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:#fff;transition:background .4s}
.ring-svg{position:absolute;inset:-6px;width:calc(100% + 12px);height:calc(100% + 12px);transform:rotate(-90deg);pointer-events:none}
.ring-track{fill:none;stroke:rgba(255,255,255,.2);stroke-width:2}
.ring-progress{fill:none;stroke:rgba(255,255,255,.8);stroke-width:2;stroke-linecap:round;stroke-dasharray:226;stroke-dashoffset:226}
.hint{text-align:center;margin-top:1.4rem;font-size:.62rem;color:#333;letter-spacing:.1em;text-transform:uppercase;transition:opacity .6s}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.visible{opacity:1;pointer-events:all}
.modal{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:2rem;width:90%;max-width:320px}
.modal-title{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:#555;margin-bottom:1.2rem;text-align:center}
.modal-companies{display:flex;flex-direction:column;gap:.6rem}
.modal-btn{display:flex;align-items:center;gap:1rem;padding:.85rem 1rem;border:1px solid #2a2a2a;border-radius:4px;background:transparent;cursor:pointer;width:100%;text-align:left}
.modal-btn.selected{border-color:var(--c)}
.modal-btn-name{font-size:.85rem;font-weight:500;color:#ddd}
.modal-logo{width:32px;height:32px;object-fit:contain;background:white;border-radius:3px;padding:2px;flex-shrink:0}
.modal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.modal-close{margin-top:1.2rem;width:100%;padding:.7rem;border:1px solid #2a2a2a;border-radius:4px;background:transparent;color:#555;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
@media(max-width:480px){.card{grid-template-columns:1fr 130px}.card-left{padding:1.6rem 1.4rem}.company-name{font-size:1.05rem}.person-name{font-size:.95rem}#qrcode{width:80px!important;height:80px!important}#qrcode canvas,#qrcode img{width:80px!important;height:80px!important}.logo-wrap{width:50px;height:50px}.logo-wrap img{max-width:46px;max-height:46px}.logo-initial{width:44px;height:44px;font-size:1.1rem}.card-right{padding:1rem;gap:.7rem}}
</style>
</head>
<body>
<div class="card-scene">
  <div class="card" id="card">
    <div class="card-left" id="cardLeft">
      <div>
        <div class="company-name" id="companyName"></div>
        <div class="divider" id="divider"></div>
        <div class="person-name">David Courtin</div>
        <div class="person-title">Responsable d'exploitation</div>

      <div class="contact-list">
        <div class="contact-item">

          <span>06 46 44 45 12</span>

        <div class="contact-item">
          <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <span>david.courtin.exploitation@gmail.com</span>
        </div>
        <div class="contact-item">
          <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="addressText"></span>
        </div>
      </div>
    </div>
    <div class="card-right" id="cardRight">
      <div class="accent-bar" id="accentBar"></div>
      <div class="logo-wrap" id="logoWrap">
        <svg class="ring-svg" viewBox="0 0 76 76">
          <circle class="ring-track" cx="38" cy="38" r="34"/>
          <circle class="ring-progress" id="ringProgress" cx="38" cy="38" r="34"/>
        </svg>
        <div class="logo-initial" id="logoInitial"></div>
      </div>
      <div>
        <div id="qrcode"></div>
        <div class="qr-label">Scanner ma carte</div>
      </div>
    </div>
  </div>
</div>
<p class="hint" id="hint">Appuyez longuement sur le logo pour changer de société</p>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Sélectionner la société</div>
    <div class="modal-companies" id="modalCompanies"></div>
    <button class="modal-close" id="modalClose">Fermer</button>
  </div>
</div>

const companies = [
  {name:"Fraisseix\nDéménagements",shortName:"Fraisseix Déménagements",logoKey:"fraisseix",initial:"F",address:"5 rue Santos-Dumont, 87000 Limoges",color:"#1a2e4a",accent:"#c8a96e",rightBg:"#f0f3f8"},
  {name:"BARDON\nDéménagements",shortName:"Bardon Déménagements",logoKey:"bardon",initial:"B",address:"16 rue d'Aguesseau, 87000 Limoges",color:"#e63900",accent:"#ff6633",rightBg:"#fff4f0"},
  {name:"Les Déménageurs\nLimousins",shortName:"Les Déménageurs Limousins",logoKey:"ldl",initial:"L",address:"310 rue François Perrin, 87000 Limoges",color:"#1a2e6b",accent:"#cc1e1e",rightBg:"#f0f3f8"},
  {name:"Limo Dem",shortName:"Limo Dem",logoKey:"limodem",initial:"LD",address:"5 rue Santos-Dumont, 87000 Limoges",color:"#3a3a3a",accent:"#777",rightBg:"#f5f5f5"}
];
let currentIndex=0, pressTimer=null, rafId=null, hintHidden=false;
const HOLD=700;

function applyCompany(idx) {
  const c = companies[idx];
  currentIndex = idx;
  document.getElementById('companyName').textContent = c.name;
  document.getElementById('addressText').textContent = c.address;
  document.getElementById('cardLeft').style.background = c.color;
  document.getElementById('cardRight').style.background = c.rightBg;
  document.getElementById('accentBar').style.background = c.color;
  document.getElementById('divider').style.background = c.accent;

  const wrap = document.getElementById('logoWrap');
  const initial = document.getElementById('logoInitial');
  // Remove any previous img
  const oldImg = wrap.querySelector('img');
  if (oldImg) oldImg.remove();

  if (c.logoKey && LOGOS[c.logoKey]) {
    initial.style.display = 'none';
    const img = document.createElement('img');
    img.className = 'logo-img';
    img.src = LOGOS[c.logoKey];
    img.style.cssText = 'max-width:60px;max-height:60px;object-fit:contain;border-radius:4px;display:block;';
    wrap.appendChild(img);
  } else {
    initial.style.display = 'flex';
    initial.textContent = c.initial;
    initial.style.background = c.color;
  }

  const qrDiv = document.getElementById('qrcode');
  qrDiv.innerHTML = '';
  new QRCode(qrDiv, {text:CARD_URL,width:100,height:100,colorDark:c.color,colorLight:c.rightBg,correctLevel:QRCode.CorrectLevel.M});

  document.querySelectorAll('.modal-btn').forEach((btn,i) => {
    btn.classList.toggle('selected', i===idx);
    btn.style.setProperty('--c', companies[i].color);
  });
}

// Build modal
const mc = document.getElementById('modalCompanies');
companies.forEach((c,i) => {
  const btn = document.createElement('button');
  btn.className = 'modal-btn';
  btn.style.setProperty('--c', c.color);
  const logoEl = (c.logoKey && LOGOS[c.logoKey])
    ? `<img class="modal-logo" src="${LOGOS[c.logoKey]}">`
    : `<span class="modal-dot" style="background:${c.color}"></span>`;
  btn.innerHTML = logoEl + `<span class="modal-btn-name">${c.shortName}</span>`;
  btn.addEventListener('touchend', e => { e.preventDefault(); closeModal(); setTimeout(()=>applyCompany(i),30); });
  btn.addEventListener('click', () => { closeModal(); setTimeout(()=>applyCompany(i),30); });
  mc.appendChild(btn);
});

function openModal() { document.getElementById('modalOverlay').classList.add('visible'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('visible'); }
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalClose').addEventListener('touchend', e=>{e.preventDefault();closeModal();});
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target===document.getElementById('modalOverlay')) closeModal(); });

// Long press
const wrap = document.getElementById('logoWrap');
const ring = document.getElementById('ringProgress');
const C = 226;

function startPress(e) {
  e.preventDefault();
  ring.style.transition='none';
  ring.style.strokeDashoffset=C;
  let start=null;
  function tick(ts) {
    if(!start) start=ts;
    const p = Math.min((ts-start)/HOLD,1);
    ring.style.strokeDashoffset = C*(1-p);
    if(p<1) rafId=requestAnimationFrame(tick);
  }
  rafId=requestAnimationFrame(tick);
  pressTimer=setTimeout(()=>{
    cancelAnimationFrame(rafId);
    ring.style.strokeDashoffset=C;
    openModal();
    if(!hintHidden){ document.getElementById('hint').style.opacity='0'; hintHidden=true; }
  }, HOLD);
}
function cancelPress() {
  clearTimeout(pressTimer);
  cancelAnimationFrame(rafId);
  ring.style.transition='stroke-dashoffset .2s ease';
  ring.style.strokeDashoffset=C;
}
wrap.addEventListener('mousedown', startPress);
wrap.addEventListener('touchstart', startPress, {passive:false});
wrap.addEventListener('mouseup', cancelPress);
wrap.addEventListener('mouseleave', cancelPress);
wrap.addEventListener('touchend', cancelPress);
wrap.addEventListener('touchcancel', cancelPress);

applyCompany(0);
</script>
